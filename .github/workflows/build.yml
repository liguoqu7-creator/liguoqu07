name: Build hwBreakpointProc Kernel Module

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu flex bison bc libssl-dev libelf-dev cpio rsync

      - name: Cache kernel source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: ~/kernel_source
          key: kernel-aosp-6.6-v1

      - name: Get kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch android15-6.6 \
            https://android.googlesource.com/kernel/common \
            ~/kernel_source

      - name: Create minimal kernel config
        run: |
          cat > ~/kernel_source/.config << 'KCONFIG'
          CONFIG_ARM64=y
          CONFIG_MMU=y
          CONFIG_MODULES=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_KPROBES=y
          CONFIG_KRETPROBES=y
          CONFIG_HAVE_HW_BREAKPOINT=y
          CONFIG_HW_BREAKPOINT=y
          CONFIG_PERF_EVENTS=y
          CONFIG_STACKTRACE=y
          CONFIG_FRAME_POINTER=y
          CONFIG_DEBUG_INFO=y
          CONFIG_PROC_FS=y
          CONFIG_SYSFS=y
          CONFIG_MODVERSIONS=y
          KCONFIG

      - name: Prepare kernel build environment
        run: |
          cd ~/kernel_source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
          echo "Kernel headers ready"

      - name: Build module
        run: |
          # Compile C source to .o (bypasses modpost)
          cd ~/kernel_source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            M=$GITHUB_WORKSPACE/hwBreakpointProcModule/hwBreakpointProc_module \
            $GITHUB_WORKSPACE/hwBreakpointProcModule/hwBreakpointProc_module/hwBreakpointProc_module.o 2>&1 | tee $GITHUB_WORKSPACE/build.log

          # Link .o to .ko directly (skip modpost symbol check)
          cd $GITHUB_WORKSPACE/hwBreakpointProcModule/hwBreakpointProc_module
          if [ -f hwBreakpointProc_module.o ]; then
            aarch64-linux-gnu-ld -r -o hwBreakpointProc_module.ko hwBreakpointProc_module.o
            echo "Module built successfully (symbols deferred to insmod)"
          else
            echo "ERROR: .o file not generated"
            exit 1
          fi

      - name: Check result
        run: |
          KO=hwBreakpointProcModule/hwBreakpointProc_module/hwBreakpointProc_module.ko
          if [ -f "$KO" ]; then
            echo "========== BUILD SUCCESS =========="
            ls -lh "$KO"
            file "$KO"
          else
            echo "========== BUILD FAILED =========="
            tail -80 build.log
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hwBreakpointProc_module.ko
          path: hwBreakpointProcModule/hwBreakpointProc_module/hwBreakpointProc_module.ko
          retention-days: 90
