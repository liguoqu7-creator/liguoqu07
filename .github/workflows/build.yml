name: Build hwBreakpointProc Kernel Module

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu flex bison bc libssl-dev libelf-dev cpio rsync

      - name: Cache kernel source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: ~/kernel_source
          key: kernel-aosp-6.6-v1

      - name: Get kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch android15-6.6 \
            https://android.googlesource.com/kernel/common \
            ~/kernel_source

      - name: Create minimal kernel config
        run: |
          cat > ~/kernel_source/.config << 'KCONFIG'
          CONFIG_ARM64=y
          CONFIG_MMU=y
          CONFIG_MODULES=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_KPROBES=y
          CONFIG_KRETPROBES=y
          CONFIG_HAVE_HW_BREAKPOINT=y
          CONFIG_HW_BREAKPOINT=y
          CONFIG_PERF_EVENTS=y
          CONFIG_STACKTRACE=y
          CONFIG_FRAME_POINTER=y
          CONFIG_DEBUG_INFO=y
          CONFIG_PROC_FS=y
          CONFIG_SYSFS=y
          KCONFIG

      - name: Prepare kernel build environment
        run: |
          cd ~/kernel_source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
          echo "Kernel ready"

      - name: Build module
        run: |
          make -C ~/kernel_source \
            M=$PWD/hwBreakpointProcModule/hwBreakpointProc_module \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules 2>&1 | tee build.log

      - name: Check result
        run: |
          KO=hwBreakpointProcModule/hwBreakpointProc_module/hwBreakpointProc_module.ko
          if [ -f "$KO" ]; then
            echo "========== BUILD SUCCESS =========="
            ls -lh "$KO"
            file "$KO"
          else
            echo "========== BUILD FAILED =========="
            tail -80 build.log
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hwBreakpointProc_module.ko
          path: hwBreakpointProcModule/hwBreakpointProc_module/hwBreakpointProc_module.ko
          retention-days: 90
